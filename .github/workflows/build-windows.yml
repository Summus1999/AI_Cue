name: Build Windows App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: false

      - name: Install frontend dependencies
        run: npm ci

      # Keep CI unsigned for internal builds. When a real Windows certificate is
      # available, import the PFX before this step and remove --no-sign.
      - name: Build unsigned Tauri MSI
        run: npm run tauri -- build --no-sign

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-cue-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: error
